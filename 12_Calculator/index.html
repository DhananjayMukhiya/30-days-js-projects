<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="calculator">

            <form>

                <div class="display">
                    <input type="text" name="display" id="displayArea">
                </div>

                <div class="operator">
                    <input type="button" value="AC" id="allClear">
                    <input type="button" value="DE" id="delete">
                    <input type="button" value="." id="point">
                    <input type="button" value="/" id="division">
                </div>

                <div>
                    <input type="button" value="7" id="seven">
                    <input type="button" value="8" id="eight">
                    <input type="button" value="9" id="nine">
                    <input type="button" value="*" id="multiply" class="operator">
                </div>

                <div>
                    <input type="button" value="4" id="four">
                    <input type="button" value="5" id="five">
                    <input type="button" value="6" id="six">
                    <input type="button" value="-" id="minus" class="operator">
                </div>

                <div>
                    <input type="button" value="1" id="one">
                    <input type="button" value="2" id="two">
                    <input type="button" value="3" id="three">
                    <input type="button" value="+" id="plus" class="operator">
                </div>

                <div>
                    <input type="button" value="00" id="doubleZero">
                    <input type="button" value="0" id="zero">
                    <input type="button" value="=" class="equal operator" id="equal">
                </div>

            </form>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
