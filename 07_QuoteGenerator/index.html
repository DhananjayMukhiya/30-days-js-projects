<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
     <div class="quote-box">
        <h2>Quote of the day</h2>
        <blockquote id="quoteContent">Loading...</blockquote>
        <span id="authorName">Loading...</span>
        <div>
            <button id="newQuoteBtn">New Quote</button>
            <button id="tweetBtn"><img src="twitter.png">Tweet</button>
        </div>
     </div>

    <script src="script.js"></script>
</body>
</html>
